<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Mate Solutions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--TOP BAR: LOGO + NAV-->
    <header class="top-bar container">
        <div class="logo-wrap">
            <img src="https://i.postimg.cc/kXTTg3vp/new-banner.png"
                 alt="Mate Solutions logo"
                 class="logo-img">
            <div class="logo-text">
                <span class="logo-main">Mate Solutions</span>
                <span class="logo-sub">MATE CODE STUDIO</span>
            </div>
        </div>

        <nav class="main-nav">
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="aboutme.html">About Me</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <!-- CONTACT FORM-->
    <main class="page">
        <section class="section fade-up">
            <div class="section-header">
                <h2>Contact</h2>
                <p class="sub">
                    Tell me a bit about your project or idea and I’ll get back to you during my business hours.
                </p>
            </div>

            <form id="contactForm" class="contact-form">
                <label>
                    Name
                    <input type="text" name="name" required>
                </label>

                <label>
                    Email
                    <input type="email" name="email" required>
                </label>

                <label>
                    Message
                    <textarea name="message" rows="5" required></textarea>
                </label>

                <button type="submit" class="btn primary">Send Message</button>

                <p id="formMessage" class="form-message"></p>
            </form>
        </section>
    </main>

    <!-- JS file -->
    <script src="script.js"></script>
     <!--FOOTER -->
    <footer class="site-footer">
        <p>&copy; 2025 Alex Mate · Mate Solutions · Mate Code Studio</p>
    </footer>
</body>
</html>
